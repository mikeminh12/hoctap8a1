<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="detailPageTitle">Chi tiết Tài liệu</title>
  <link id="theme-style" rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #f7fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1200px;
      margin: 100px auto 40px;
      padding: 0 20px;
    }

    h1 {
      color: #1a202c;
      margin-bottom: 24px;
      font-size: 2rem;
      font-weight: 700;
    }

    .back-btn {
      position: fixed;
      top: 90px;
      left: 30px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9);
      color: #2b6cb0;
      border: 1px solid #e2e8f0;
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      color: #2c5282;
    }

    #fileDetailGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      padding: 30px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
      border: 1px solid #edf2f7;
    }

    .file-card-detail {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .file-card-detail:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
      border-color: #cbd5e0;
    }

    .preview-img-detail {
      width: 100%;
      height: 160px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 16px;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #718096;
      border: 1px solid #edf2f7;
      overflow: hidden;
    }

    .preview-img-detail img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .file-card-detail:hover .preview-img-detail img {
      transform: scale(1.05);
    }

    .file-card-detail h4 {
      margin: 8px 0 16px;
      color: #2d3748;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-card-detail a {
      display: inline-block;
      margin-top: auto;
      padding: 8px 20px;
      background: #ebf4ff;
      color: #3182ce;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      width: 80%;
    }

    .file-card-detail a:hover {
      background: #3182ce;
      color: #fff;
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
      z-index: 2000;
    }

    .modal-content {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .close-btn {
      position: absolute;
      top: 25px;
      right: 35px;
      font-size: 40px;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      z-index: 3000;
      transition: color 0.2s;
      line-height: 1;
    }

    .close-btn:hover {
      color: #fff;
    }

    .modal-body-content {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .zoomable {
      max-width: 90vw;
      max-height: 90vh;
      cursor: grab;
      transition: transform 0.1s cubic-bezier(0.2, 0, 0.2, 1);
      will-change: transform;
      transform-origin: center center;
      object-fit: contain;
    }

    .zoomable.dragging {
      cursor: grabbing;
      transition: none;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 32px;
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      z-index: 3000;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      user-select: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      width: 60px;
    }

    .nav-arrow:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-50%) scale(1.05);
      color: #fff;
    }

    .left-arrow {
      left: 40px;
    }

    .right-arrow {
      right: 40px;
    }

    .image-counter {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 1px;
      z-index: 3000;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
  </style>
  <link rel="icon" href="8A1.png" type="image/png">
</head>

<script src="snow.js"></script>

<body>
  <!-- NAVBAR GIỮ NGUYÊN -->
  <div id="navbar"></div>

  <button class="back-btn" onclick="window.location.href='doc.html'">Quay lại</button>

  <script type="module">
    fetch("nav.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("navbar").innerHTML = html;
        import('./nav.js');
      });
  </script>

  <div class="container">
    <h1 id="detailHeader">Tài liệu chi tiết</h1>
    <div id="fileDetailGrid">
      <p>Đang tải tài liệu...</p>
    </div>
  </div>

  <!-- MODAL (CHỈ THÊM ARROW + COUNTER) -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>

      <div class="nav-arrow left-arrow">❮</div>
      <div class="nav-arrow right-arrow">❯</div>
      <div class="image-counter" id="imageCounter"></div>

      <div id="modalBody" class="modal-body-content"></div>
    </div>
  </div>

  <script type="module">
    import { db, doc, onSnapshot } from "./firebase.js";

    const folderId = new URLSearchParams(window.location.search).get('id');
    const detailHeaderEl = document.getElementById('detailHeader');
    const fileDetailGridEl = document.getElementById('fileDetailGrid');
    const modal = document.getElementById("myModal");
    const modalBodyEl = document.getElementById("modalBody");
    const counterEl = document.getElementById("imageCounter");

    let imageFiles = [];
    let currentIndex = 0;
    let scale = 1;

    document.querySelector(".close-btn").onclick = () => {
      modal.style.display = "none";
      modalBodyEl.innerHTML = "";
      if (window._cleanupZoom) {
        window._cleanupZoom();
        window._cleanupZoom = null;
      }
    };

    if (folderId) {
      onSnapshot(doc(db, "docs", folderId), snap => {
        if (!snap.exists()) {
          fileDetailGridEl.innerHTML = '<p>Không tìm thấy tài liệu.</p>';
          return;
        }
        const data = snap.data();
        if (data.title) detailHeaderEl.textContent = "Tài liệu: " + data.title;
        const files = data.files || [];
        imageFiles = files.filter(f => f.type?.startsWith("image/"));
        renderFilesDetail(files);
      });
    }

    function renderFilesDetail(files) {
      if (!files.length) {
        fileDetailGridEl.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #718096; padding: 40px;">Thư mục này hiện chưa có file nào.</p>';
        return;
      }
      fileDetailGridEl.innerHTML = '';
      files.forEach(file => {
        const card = document.createElement('div');
        card.className = 'file-card-detail';
        card.innerHTML = `
          <div class="preview-img-detail">
            ${file.type.startsWith('image/') ? `<img src="${file.url}" alt="${file.name}">` : file.name.split('.').pop()}
          </div>
          <h4 title="${file.name}">${file.name}</h4>
          <a href="#">👁️ Xem chi tiết</a>
        `;
        card.querySelector('a').onclick = e => {
          e.preventDefault();
          openFile(file);
        };
        fileDetailGridEl.appendChild(card);
      });
    }

    function openFile(file) {
      modalBodyEl.innerHTML = '';
      scale = 1;

      if (window._cleanupZoom) {
        window._cleanupZoom();
        window._cleanupZoom = null;
      }

      if (file.type.startsWith('image/')) {
        currentIndex = imageFiles.findIndex(f => f.url === file.url);
        modalBodyEl.innerHTML = `<img src="${file.url}" class="zoomable" id="zoomImg" draggable="false">`;
        setupImageControls();
        updateCounter();
        toggleNav(true);
      } else {
        modalBodyEl.innerHTML = `<div style="color:white; font-size:1.2rem; text-align:center; padding:20px;">Không thể xem trước loại file này trực tiếp.<br/><br/><a href="${file.url}" target="_blank" style="color:#63b3ed; text-decoration: underline;">Tải xuống / Mở trong tab mới</a></div>`;
        toggleNav(false);
      }

      modal.style.display = "block";
    }

    function setupImageControls() {
      const img = document.getElementById("zoomImg");
      if (!img) return;

      let isDragging = false;
      let startX = 0, startY = 0;
      let translateX = 0, translateY = 0;

      const setTransform = () => {
        // We use requestAnimationFrame for smoother updates if needed,
        // but simple style update is usually fine for vanilla js
        img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
      };

      img.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (scale > 1) {
          isDragging = true;
          startX = e.clientX - translateX;
          startY = e.clientY - translateY;
          img.classList.add('dragging');
        }
      });

      const onMouseMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();
        translateX = e.clientX - startX;
        translateY = e.clientY - startY;
        setTransform();
      };

      const onMouseUp = () => {
        if (isDragging) {
          isDragging = false;
          img.classList.remove('dragging');
        }
      };

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);

      window._cleanupZoom = () => {
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      };

      img.addEventListener('wheel', (e) => {
        e.preventDefault();

        const zoomIntensity = 0.1;
        const wheel = e.deltaY < 0 ? 1 : -1;
        const newScale = scale * Math.exp(wheel * zoomIntensity);
        const targetScale = Math.min(Math.max(1, newScale), 5);

        // Zoom towards mouse
        const rect = img.getBoundingClientRect();
        const imgCenterX = rect.left + rect.width / 2;
        const imgCenterY = rect.top + rect.height / 2;

        // Offset of cursor from center
        const dx = e.clientX - imgCenterX;
        const dy = e.clientY - imgCenterY;

        const ratio = 1 - targetScale / scale;

        if (targetScale !== scale) {
          translateX += dx * ratio;
          translateY += dy * ratio;
          scale = targetScale;

          if (scale === 1) {
            translateX = 0;
            translateY = 0;
          }
          setTransform();
        }
      }, { passive: false });
    }

    document.querySelector(".left-arrow").onclick = () => changeImage(-1);
    document.querySelector(".right-arrow").onclick = () => changeImage(1);

    function changeImage(step) {
      if (imageFiles.length === 0) return;
      currentIndex = (currentIndex + step + imageFiles.length) % imageFiles.length;
      openFile(imageFiles[currentIndex]);
    }

    function updateCounter() {
      counterEl.textContent = `${currentIndex + 1} / ${imageFiles.length}`;
    }

    function toggleNav(show) {
      document.querySelector(".left-arrow").style.display = show ? "flex" : "none";
      document.querySelector(".right-arrow").style.display = show ? "flex" : "none";
      counterEl.style.display = show ? "block" : "none";
    }
  </script>
</body>

</html>
