<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chơi Solo - Đấu Trí Trực Tiếp</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f0f4f8; }
        .solo-container { display: flex; gap: 20px; max-width: 1200px; margin: 30px auto; padding: 0 20px; align-items: flex-start; }
        
        /* Cột bên trái */
        .solo-sidebar { flex: 0 0 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status-box { text-align: center; margin-bottom: 20px; padding: 15px; background: #e8f4fd; border-radius: 8px; }
        .timer { font-size: 2rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .player-list { list-style: none; padding: 0; margin: 0; }
        .player-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center;}
        .player-item:last-child { border-bottom: none; }
        .player-score { font-weight: bold; color: #f39c12; }
        .status-badge { font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; }
        .status-ready { background: #2ecc71; color: white; }
        .status-wrong { background: #e74c3c; color: white; text-decoration: line-through; }

        /* Cột chính */
        .solo-main { flex: 1; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; min-height: 500px; position: relative;}
        
        /* Chờ người chơi & Đếm ngược */
        #waiting-screen, #countdown-screen, #result-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .big-countdown { font-size: 6rem; color: #3498db; font-weight: bold; }
        
        /* Màn hình câu hỏi */
        #question-screen { display: none; text-align: left; }
        .question-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; color: #2c3e50; }
        .option-btn { display: block; width: 100%; text-align: left; background: #fff; border: 2px solid #bdc3c7; padding: 15px 20px; margin: 12px 0; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { background: #f8fafc; border-color: #3498db; }
        .option-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .option-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .option-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        /* Thêm vào thẻ <style> trong quiz-solo.html */
#q-text {
    color: #2c3e50 !important; /* Màu xanh đen đậm */
    display: block;
    min-height: 1.5em;
}
.option-btn {
    color: #333 !important; /* Màu chữ đáp án */
}
#answer-feedback {
    min-height: 1.2em;
}
    </style>
</head>
<body>
    <div class="solo-container">
        <aside class="solo-sidebar">
            <div class="status-box">
                <h3 style="margin:0; color:#34495e;">Phòng: <span id="room-id-display">---</span></h3>
                <div class="timer" id="question-timer">00:00</div>
                <div style="font-weight: bold; color: #7f8c8d;" id="question-progress">Tiến độ: --/--</div>
            </div>
            
            <h4 style="margin-bottom: 10px; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px;">🏆 Bảng Xếp Hạng</h4>
            <ul class="player-list" id="players-list">
                </ul>
        </aside>

        <main class="solo-main">
            <div id="waiting-screen">
                <h2>Đang trong phòng chờ...</h2>
                <p>Chia sẻ link này cho bạn bè để cùng chơi!</p>
                <button id="btn-ready" class="btn" style="background:#2ecc71; color:white; padding: 15px 40px; font-size: 1.2rem; margin-top: 20px;">Sẵn Sàng</button>
            </div>

            <div id="countdown-screen" style="display: none;">
                <h2>Chuẩn bị...</h2>
                <div class="big-countdown" id="start-countdown">3</div>
            </div>

            <div id="question-screen">
                <div class="question-text" id="q-text">Đang tải câu hỏi...</div>
                <div id="options-container">
                    </div>
                <div id="answer-feedback" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem; text-align: center;"></div>
            </div>

            <div id="result-screen" style="display: none;">
                <h1 style="color: #f39c12; font-size: 3rem;">🎉 KẾT THÚC 🎉</h1>
                <h2 id="winner-name">Người chiến thắng: ---</h2>
                <button class="btn btn-primary" onclick="window.location.href='quiz.html'" style="margin-top: 20px;">Quay lại danh sách</button>
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="quiz-solo.js"></script>
</body>
</html>
